<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة العيد - جمعية عمارة للعناية بالمساجد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f6f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h2 {
            color: #105C66;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p.subtitle {
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 85%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #105C66;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 25px;
        }
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .btn {
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            width: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .btn-download {
            background-color: #d39e35;
        }
        .btn-download:hover {
            background-color: #b8862d;
        }
        .btn-whatsapp {
            background-color: #d39e35;
        }
        .btn-whatsapp:hover {
            background-color: #b8862d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>تهنئة عيد الفطر المبارك</h2>
        <p class="subtitle">من جمعية عمارة للعناية بالمساجد بمنطقة جازان</p>
        
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="أدخل اسمك هنا للحصول على البطاقة..." oninput="drawCard()">
        </div>

        <canvas id="cardCanvas" width="1080" height="1350"></canvas>
        
        <div class="action-buttons">
            <button class="btn btn-download" onclick="downloadCard()">تحميل البطاقة 📥</button>
            <a href="#" id="whatsappLink" class="btn btn-whatsapp" onclick="shareOnWhatsApp(event)">ارسل عبر الواتساب 💬</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        const image = new Image();
        
        image.src = 'card.jpg';

        document.fonts.ready.then(() => {
            image.onload = () => {
                canvas.width = image.width;
                canvas.height = image.height;
                drawCard();
            };
            if(image.complete) {
                canvas.width = image.width;
                canvas.height = image.height;
                drawCard();
            }
        });

        function drawCard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

            const name = document.getElementById('nameInput').value;

            if (name.trim() !== "") {
                ctx.font = '700 45px "Tajawal", sans-serif'; 
                ctx.fillStyle = '#105C66'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const x = canvas.width / 2;
                const y = canvas.height * 0.915; 

                ctx.fillText(name, x, y);
            }
        }

        function prepareDownload() {
            const name = document.getElementById('nameInput').value;
            if (name.trim() === "") {
                alert("الرجاء إدخال اسمك أولاً.");
                return null;
            }
            return {
                dataUrl: canvas.toDataURL('image/png'),
                filename: `تهنئة_جمعية_عمارة_${name}.png`
            };
        }

        function downloadCard() {
            const fileData = prepareDownload();
            if(!fileData) return;

            const link = document.createElement('a');
            link.download = fileData.filename;
            link.href = fileData.dataUrl;
            link.click();
        }

        function shareOnWhatsApp(event) {
            event.preventDefault();

            const fileData = prepareDownload();
            if(!fileData) return;

            const name = document.getElementById('nameInput').value;
            const message = `عيدكم مبارك، تقبل الله منا ومنكم صالح الأعمال.\nبطاقة تهنئة خاصة باسمك من جمعية عمارة للعناية بالمساجد بمنطقة جازان.\n\nيمكنك إنشاء بطاقتك أيضاً من هنا:\n${window.location.href}`;
            const encodedMessage = encodeURIComponent(message);

            const link = document.createElement('a');
            link.download = fileData.filename;
            link.href = fileData.dataUrl;
            document.body.appendChild(link);
